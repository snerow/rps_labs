spring.application.name=a-thymeleaf
server.port=8080

spring.messages.basename=messages
spring.messages.encoding=UTF-8

# JPA Configuration (file-based H2 - data persists between restarts)
spring.datasource.url=jdbc:h2:file:./data/universitydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# SQL Initialization
spring.sql.init.mode=always

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Alternative database configurations (commented out):
# PostgreSQL: spring.datasource.url=jdbc:postgresql://localhost:5432/universitydb
# MySQL: spring.datasource.url=jdbc:mysql://localhost:3306/universitydb
# Oracle: spring.datasource.url=jdbc:oracle:thin:@localhost:1521:ORCL
# SQL Server: spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=universitydb
