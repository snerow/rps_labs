<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{marks.edit.title})}"></head>
<body>
    <div th:replace="~{fragments/layout :: main(~{::content})}">
        <div th:fragment="content">
            <h2 th:text="#{marks.edit.title}">Редактирование оценок</h2>

            <div class="alert alert-info">
                <p>ID ученика: <strong th:text="${id}">1</strong></p>
                <p th:text="#{marks.edit.info}">Введите оценки для каждого предмета</p>
            </div>

            <form method="post">
                <div class="mb-3">
                    <label class="form-label" th:text="#{marks.edit.math}">Математика</label>
                    <input type="number" class="form-control" name="math" min="1" max="100" th:value="${marks?.math} ?: '85'" />
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{marks.edit.physics}">Физика</label>
                    <input type="number" class="form-control" name="physics" min="1" max="100" th:value="${marks?.physics} ?: '90'" />
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{marks.edit.chemistry}">Химия</label>
                    <input type="number" class="form-control" name="chemistry" min="1" max="100" th:value="${marks?.chemistry} ?: '78'" />
                </div>
                <button type="submit" class="btn btn-primary" th:text="#{button.save}">Сохранить</button>
                <a th:href="@{/students/{id}/marks(id=${id})}" class="btn btn-secondary" th:text="#{button.cancel}">Отмена</a>
            </form>
        </div>
    </div>
</body>
</html>
