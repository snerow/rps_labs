<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${action})}"></head>
<body>
    <div th:replace="~{fragments/layout :: main(~{::content})}">
        <div th:fragment="content">
            <h2 th:text="${action}">Действие</h2>

            <div class="alert alert-info">
                <p>Страница: <strong th:text="${action}">Действие</strong></p>
                <p>Только МЕНЕДЖЕР может получить доступ к этой странице.</p>
            </div>

            <form method="post">
                <div class="mb-3">
                    <label class="form-label">ФИО ученика</label>
                    <input type="text" class="form-control" name="name" th:value="${student?.name}" placeholder="Введите ФИО ученика" required />
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" th:value="${student?.email}" placeholder="Введите email" required />
                </div>
                <button type="submit" class="btn btn-primary" th:text="#{button.save}">Сохранить</button>
                <a href="/students" class="btn btn-secondary" th:text="#{button.cancel}">Отмена</a>
            </form>
        </div>
    </div>
</body>
</html>
