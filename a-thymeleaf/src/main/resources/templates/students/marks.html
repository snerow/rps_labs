<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(#{marks.title})}"></head>
<body>
    <div th:replace="~{fragments/layout :: main(~{::content})}">
        <div th:fragment="content">
            <h2 th:text="#{marks.title}">Оценки</h2>

            <div class="alert alert-info">
                <p>ID ученика: <strong th:text="${id}">1</strong></p>
                <p>Просмотр оценок ученика.</p>
            </div>

            <div class="card">
                <div class="card-body">
                    <h5 class="card-title" th:text="#{marks.title}">Оценки</h5>
                    <table class="table">
                        <thead>
                            <tr>
                                <th th:text="#{marks.subject}">Предмет</th>
                                <th th:text="#{marks.value}">Оценка</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td th:text="#{marks.edit.math}">Математика</td>
                                <td th:text="${marks?.math} ?: '0'">85</td>
                            </tr>
                            <tr>
                                <td th:text="#{marks.edit.physics}">Физика</td>
                                <td th:text="${marks?.physics} ?: '0'">90</td>
                            </tr>
                            <tr>
                                <td th:text="#{marks.edit.chemistry}">Химия</td>
                                <td th:text="${marks?.chemistry} ?: '0'">78</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div sec:authorize="hasAnyRole('MANAGER', 'TEACHER')" class="mt-3">
                <a th:href="@{/students/{id}/marks/edit(id=${id})}" class="btn btn-warning" th:text="#{students.marks.edit}">Изменить оценки</a>
            </div>
        </div>
    </div>
</body>
</html>
