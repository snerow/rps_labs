<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">MyProject</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1;
        }
        .navbar-brand {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- Header Fragment -->
    <header th:fragment="header">
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
            <div class="container">
                <a class="navbar-brand" th:href="@{/}" th:text="#{project.name}">MyProject</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/}" th:text="#{nav.home}">Home</a>
                        </li>
                        <li class="nav-item" th:if="${session.user != null}">
                            <a class="nav-link" th:href="@{/users}" th:text="#{nav.users}">Users</a>
                        </li>
                    </ul>
                    <ul class="navbar-nav">
                        <li class="nav-item" th:if="${session.user == null}">
                            <a class="nav-link" th:href="@{/login}" th:text="#{nav.login}">Login</a>
                        </li>
                        <li class="nav-item" th:if="${session.user == null}">
                            <a class="nav-link" th:href="@{/signup}" th:text="#{nav.register}">Register</a>
                        </li>
                        <li class="nav-item" th:if="${session.user != null}">
                            <span class="nav-link" th:text="'Welcome, ' + ${session.user.username}">Welcome, user</span>
                        </li>
                        <li class="nav-item" th:if="${session.user != null}">
                            <a class="nav-link" th:href="@{/logout}" th:text="#{nav.logout}">Logout</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Footer Fragment -->
    <footer th:fragment="footer" class="bg-light py-3 mt-auto border-top">
        <div class="container text-center">
            <span class="text-muted" th:text="#{footer.text}">2024 - MyProject</span>
        </div>
    </footer>

    <!-- Main Layout -->
    <div th:fragment="main(content)" class="d-flex flex-column min-vh-100">
        <div th:replace="~{fragments/layout :: header}"></div>
        <main class="container my-4">
            <div th:replace="${content}"></div>
        </main>
        <div th:replace="~{fragments/layout :: footer}"></div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </div>
</body>
</html>
