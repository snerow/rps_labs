<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">MyProject</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1;
        }
        .navbar-brand {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- Header Fragment -->
    <header th:fragment="header">
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
            <div class="container">
                <a class="navbar-brand" th:href="@{/}" th:text="#{project.name}">MyProject</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/}" th:text="#{nav.home}">Home</a>
                        </li>
                        <!-- Teachers tab: only for MANAGER -->
                        <li class="nav-item" sec:authorize="hasRole('MANAGER')">
                            <a class="nav-link" th:href="@{/teachers}" th:text="#{nav.teachers}">Учителя</a>
                        </li>
                        <!-- Students tab: for MANAGER and TEACHER -->
                        <li class="nav-item" sec:authorize="hasAnyRole('MANAGER', 'TEACHER')">
                            <a class="nav-link" th:href="@{/students}" th:text="#{nav.students}">Ученики</a>
                        </li>
                        <!-- Subjects tab: for all authenticated users -->
                        <li class="nav-item" sec:authorize="isAuthenticated()">
                            <a class="nav-link" th:href="@{/subjects}" th:text="#{nav.subjects}">Предметы</a>
                        </li>
                        <!-- Tests tab: for all authenticated users -->
                        <li class="nav-item" sec:authorize="isAuthenticated()">
                            <a class="nav-link" th:href="@{/tests}" th:text="#{nav.tests}">Тесты</a>
                        </li>
                    </ul>
                    <ul class="navbar-nav">
                        <li class="nav-item" sec:authorize="!isAuthenticated()">
                            <a class="nav-link" th:href="@{/login}" th:text="#{nav.login}">Login</a>
                        </li>
                        <li class="nav-item" sec:authorize="isAuthenticated()">
                            <span class="nav-link"><span th:text="#{nav.welcome}">Добро пожаловать</span>, <span sec:authentication="name">user</span></span>
                        </li>
                        <li class="nav-item" sec:authorize="isAuthenticated()">
                            <form th:action="@{/logout}" method="post" style="display:inline">
                                <button type="submit" class="btn btn-link nav-link" style="border:none; background:none; cursor:pointer;" th:text="#{nav.logout}">Logout</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Footer Fragment -->
    <footer th:fragment="footer" class="bg-light py-3 mt-auto border-top">
        <div class="container text-center">
            <span class="text-muted" th:text="#{footer.text}">2024 - MyProject</span>
        </div>
    </footer>

    <!-- Main Layout -->
    <div th:fragment="main(content)" class="d-flex flex-column min-vh-100">
        <div th:replace="~{fragments/layout :: header}"></div>
        <main class="container my-4">
            <div th:replace="${content}"></div>
        </main>
        <div th:replace="~{fragments/layout :: footer}"></div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </div>
</body>
</html>
