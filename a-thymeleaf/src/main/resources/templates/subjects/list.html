<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(#{subjects.title})}"></head>
<body>
    <div th:replace="~{fragments/layout :: main(~{::content})}">
        <div th:fragment="content">
            <h2 th:text="#{subjects.title}">Предметы</h2>

            <!-- Only TEACHER can see Add New Subject button -->
            <div sec:authorize="hasRole('TEACHER')" class="mb-3">
                <a href="/subjects/new" class="btn btn-primary" th:text="#{subjects.add}">Добавить предмет</a>
            </div>

            <!-- Subjects Table -->
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Описание</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="subject : ${subjects}">
                        <td th:text="${subject.id}">1</td>
                        <td th:text="${subject.name}">Математика</td>
                        <td th:text="${subject.description}">Алгебра и геометрия</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
