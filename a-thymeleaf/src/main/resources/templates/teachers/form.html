<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${action})}"></head>
<body>
    <div th:replace="~{fragments/layout :: main(~{::content})}">
        <div th:fragment="content">
            <h2 th:text="${action}">Действие</h2>

            <div class="alert alert-info">
                <p>Страница: <strong th:text="${action}">Действие</strong></p>
                <p>Только МЕНЕДЖЕР может получить доступ к этой странице.</p>
            </div>

            <form method="post">
                <!-- Only show username/password for new teacher (when teacher is null) -->
                <div th:if="${teacher == null}">
                    <div class="mb-3">
                        <label class="form-label">Имя пользователя</label>
                        <input type="text" class="form-control" name="username" placeholder="Введите имя пользователя" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" class="form-control" name="password" placeholder="Введите пароль" required />
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">ФИО учителя</label>
                    <input type="text" class="form-control" name="name" th:value="${teacher?.name}" placeholder="Введите ФИО учителя" required />
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" th:value="${teacher?.email}" placeholder="Введите email" required />
                </div>
                <button type="submit" class="btn btn-primary" th:text="#{button.save}">Сохранить</button>
                <a href="/teachers" class="btn btn-secondary" th:text="#{button.cancel}">Отмена</a>
            </form>
        </div>
    </div>
</body>
</html>
