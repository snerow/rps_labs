<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(#{teachers.title})}"></head>
<body>
    <div th:replace="~{fragments/layout :: main(~{::content})}">
        <div th:fragment="content">
            <h2 th:text="#{teachers.title}">Учителя</h2>

            <!-- Only MANAGER can see Add New Teacher button -->
            <div sec:authorize="hasRole('MANAGER')" class="mb-3">
                <a href="/teachers/new" class="btn btn-primary" th:text="#{teachers.add}">Добавить учителя</a>
            </div>

            <!-- Teachers Table -->
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Имя пользователя</th>
                        <th>ФИО</th>
                        <th>Email</th>
                        <th sec:authorize="hasRole('MANAGER')">Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="teacher : ${teachers}">
                        <td th:text="${teacher.id}">1</td>
                        <td th:text="${teacher.username}">teacher</td>
                        <td th:text="${teacher.name}">Иванов Иван Иванович</td>
                        <td th:text="${teacher.email}">teacher@school.ru</td>
                        <td sec:authorize="hasRole('MANAGER')">
                            <a th:href="@{/teachers/{id}/edit(id=${teacher.id})}" class="btn btn-warning btn-sm" th:text="#{teachers.edit}">Изменить профиль</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
