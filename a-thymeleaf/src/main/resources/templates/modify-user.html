<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Modify User')}"></head>
<body>
    <div th:replace="~{fragments/layout :: main(~{::content})}">
        <div th:fragment="content">
            <h2 class="mb-3" th:text="#{modifyUser.title}">Modify User</h2>

            <div class="mb-4">
                <label class="form-label fw-bold" th:text="#{modifyUser.username}">Username</label>
                <input type="text" class="form-control bg-light" th:value="${modifyUser.username}" readonly />
            </div>

            <h3 th:text="#{modifyUser.authorities}">Authorities</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th th:text="#{modifyUser.authority}">Authority</th>
                        <th th:text="#{modifyUser.action}">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="authority : ${modifyUser.authorities}">
                        <td th:text="${authority}" class="align-middle">ADMIN</td>
                        <td>
                            <form th:action="@{/users/authority/delete}" method="post">
                                <input type="hidden" name="username" th:value="${modifyUser.username}" />
                                <input type="hidden" name="authority" th:value="${authority}" />
                                <button type="submit" class="btn btn-danger btn-sm" th:text="#{users.delete}">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="mt-3">
                <label class="form-label" th:text="#{modifyUser.addAuthority}">Add Authority</label>
                <form th:action="@{/users/authority/add}" method="post" class="d-flex gap-2 flex-column">
                    <input type="hidden" name="username" th:value="${modifyUser.username}" />
                    <select name="authority" class="form-select">
                        <option value="" th:text="#{modifyUser.selectRole}">Select Role</option>
                        <option value="USER" th:text="#{modifyUser.role.USER}">USER</option>
                        <option value="ADMIN" th:text="#{modifyUser.role.ADMIN}">ADMIN</option>
                    </select>
                    <div>
                        <button type="submit" class="btn btn-success" th:text="#{modifyUser.addRole}">Add Role</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
