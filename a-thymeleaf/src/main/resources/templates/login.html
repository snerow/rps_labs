<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>
    <div th:replace="~{fragments/layout :: main(~{::content})}">
        <div th:fragment="content">
            <!-- Error message -->
            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                <span th:text="#{login.error}">Invalid username and password.</span>
            </div>

            <div class="row justify-content-center">
                <div class="col-md-6">
                    <h2 class="text-center mb-1 fw-bold" th:text="#{login.title}">Login</h2>
                    <p class="text-center mb-4">
                        <span class="text-danger">Fill</span>
                        <span th:text="' out the following form to log in.'"> out the following form to log in.</span>
                    </p>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label" th:text="#{login.username}">Username</label>
                            <input type="text" class="form-control" name="username" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{login.password}">Password</label>
                            <input type="password" class="form-control" name="password" required />
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" name="remember-me" id="rememberMe" />
                            <label class="form-check-label" for="rememberMe" th:text="#{login.remember}">Remember me</label>
                        </div>
                        <button type="submit" class="btn btn-primary" th:text="#{login.button}">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
